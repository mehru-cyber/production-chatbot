<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-screen" class="screen">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">STOCK AGENT</span>
    </div>
    <p class="auth-sub">Sign in to start a session</p>

    <form id="auth-form" class="auth-form" autocomplete="on">
      <label class="field">
        <span class="field-label">EMAIL</span>
        <input id="email" type="email" autocomplete="email" required>
      </label>
      <label class="field">
        <span class="field-label">PASSWORD</span>
        <input id="password" type="password" autocomplete="current-password" minlength="8" required>
      </label>

      <div class="auth-actions">
        <button type="submit" id="login-btn" class="btn btn-primary">Log in</button>
        <button type="button" id="register-btn" class="btn btn-ghost">Create account</button>
      </div>
    </form>

    <p id="auth-error" class="auth-error" role="alert" aria-live="polite"></p>
  </div>
</div>

<div id="app-shell" class="screen screen--shell">

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-dot brand-dot--live"></span>
        <span class="brand-name">STOCK AGENT</span>
      </div>
      <button id="sidebar-close-btn" class="btn-icon btn-icon--mobile" aria-label="Close sidebar">✕</button>
    </div>

    <button id="new-chat-btn" class="btn btn-new-chat">
      <span class="new-chat-icon">+</span> New chat
    </button>

    <nav class="thread-nav">
      <div class="thread-section">
        <h3 class="thread-section-label">PINNED</h3>
        <div id="pinned-list" class="thread-list"></div>
      </div>
      <div class="thread-section">
        <h3 class="thread-section-label">RECENT</h3>
        <div id="recent-list" class="thread-list"></div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button id="logout-btn" class="btn-icon" title="Log out" aria-label="Log out">⏻</button>
    </div>
  </aside>

  <main id="main-panel">
    <header class="console-header">
      <button id="sidebar-open-btn" class="btn-icon btn-icon--mobile" aria-label="Open sidebar">☰</button>
      <span id="current-thread-title" class="meta-value meta-value--title">New chat</span>
    </header>

    <div id="message-log" class="message-log" aria-live="polite"></div>

    <form id="composer" class="composer">
      <span class="composer-prompt" aria-hidden="true">&gt;</span>
      <input id="chat-input" class="composer-input" type="text"
             placeholder="Message the agent…" autocomplete="off">
      <button type="submit" class="btn btn-primary btn-send">Send</button>
    </form>
  </main>
</div>

<template id="tpl-message-user">
  <div class="msg msg--user">
    <div class="msg-bubble"></div>
  </div>
</template>

<template id="tpl-message-agent">
  <div class="msg msg--agent">
    <span class="msg-label">AGENT</span>
    <div class="msg-bubble"></div>
  </div>
</template>

<template id="tpl-message-system">
  <div class="msg msg--system">
    <div class="msg-bubble"></div>
  </div>
</template>

<template id="tpl-ticket">
  <div class="ticket" role="alertdialog" aria-label="Approval required">
    <div class="ticket-head">
      <span class="ticket-flag">◆ APPROVAL REQUIRED</span>
    </div>
    <p class="ticket-prompt"></p>
    <div class="ticket-actions">
      <button class="btn btn-approve" data-decision="yes">Approve</button>
      <button class="btn btn-decline" data-decision="no">Decline</button>
    </div>
  </div>
</template>

<template id="tpl-typing">
  <div class="msg msg--agent msg--typing">
    <span class="msg-label">AGENT</span>
    <div class="msg-bubble typing-dots"><span></span><span></span><span></span></div>
  </div>
</template>

<template id="tpl-thread-item">
  <div class="thread-item">
    <span class="thread-title"></span>
    <button class="pin-btn" title="Pin/unpin chat" aria-label="Pin/unpin chat">☆</button>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
